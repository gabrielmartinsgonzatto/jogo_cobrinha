<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Cobra</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <header>
        <nav class="navbar navbar-dark">
            <div class="container">
                <span class="navbar-brand fw-bold fs-4">🐍 Jogo da Cobra</span>
                <span class="navbar-text" id="navbar-recorde">Recorde: 0</span>
            </div>
        </nav>
    </header>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6 text-center">

                <div class="titulo-bloco mb-4">
                    <h1 class="display-3 fw-bold titulo-jogo">COBRA</h1>
                    <p class="lead subtitulo">Use as setas do teclado para guiar a cobra.</p>
                </div>

                <div class="card card-recorde mb-4">
                    <div class="card-body d-flex justify-content-between align-items-center py-3">
                        <div class="text-start">
                            <span class="label-card">Melhor pontuação</span>
                            <div class="valor-recorde" id="recorde-display">0</div>
                        </div>
                        <div class="icone-trofeu">🏆</div>
                    </div>
                </div>

                <div class="mb-4">
                    <p class="label-secao mb-2">Dificuldade</p>
                    <div class="btn-group w-100" role="group">

                        <input type="radio" class="btn-check" name="dificuldade" id="facil" value="200" checked>
                        <label class="btn btn-outline-dif" for="facil">Fácil</label>

                        <input type="radio" class="btn-check" name="dificuldade" id="media" value="150">
                        <label class="btn btn-outline-dif" for="media">Média</label>

                        <input type="radio" class="btn-check" name="dificuldade" id="dificil" value="80">
                        <label class="btn btn-outline-dif" for="dificil">Difícil</label>

                    </div>
                </div>

                <a href="jogo.html" class="btn btn-jogar w-100 mb-4 py-3 fs-4" id="btn-jogar">
                    JOGAR
                </a>

                <div class="card card-instrucoes p-3">
                    <p class="label-card mb-3 fw-bold">Como Jogar</p>
                    <div class="row g-2 text-start">
                        <div class="col-6"><div class="instrucao-item">⬆️⬇️⬅️➡️ Mover</div></div>
                        <div class="col-6"><div class="instrucao-item">🍎 +10 pontos</div></div>
                        <div class="col-6"><div class="instrucao-item">🚧 Evite paredes</div></div>
                        <div class="col-6"><div class="instrucao-item">🐍 Evite o corpo</div></div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        const recorde = Number(localStorage.getItem("cobra_recorde")) || 0;

        document.getElementById("recorde-display").textContent = recorde;
        document.getElementById("navbar-recorde").textContent = "Recorde: " + recorde;

        document.getElementById("btn-jogar").addEventListener("click", function () {
            const selecionado = document.querySelector('input[name="dificuldade"]:checked');

            if (selecionado) {
                localStorage.setItem("cobra_velocidade", selecionado.value);
            }
        });
    </script>

</body>
</html>
